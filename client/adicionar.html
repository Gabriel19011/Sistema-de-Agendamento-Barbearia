<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Barbeiro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="navbar-completa">
        <div class="nav">
            <div class="container">
                <a href="index.html" class="btn">Agendados</a>
                <a href="adicionar.html" class="btn active">Adicionar</a>
                <a href="alterar.html" class="btn">Alterar</a>
                <!-- <a href="deletar.html" class="btn">Deletar</a> -->

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 90" height="90" width="700" class="outline">
                    <rect stroke-width="5" fill="transparent" height="90" width="700" y="0" x="0" pathLength="100"
                        class="rect"></rect>
                </svg>
            </div>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="conteudo-card">
                <!-- Título e linha divisória adicionados para padronizar -->
                <h2>Adicionar Agendamento</h2>
                <hr>
                <br>
                <form id="formCadastro">
                    <input id="nome" type="text" placeholder="Nome">

                    <input id="horario" type="datetime-local">

                    <input id="corte" type="text" placeholder="Tipo de Corte">

                    <!-- Botão de Salvar deslizante -->
                    <button type="submit" id="btnSalvar" class="noselect">
                        <span class="text">Salvar</span>
                        <span class="icon">
                            <svg viewBox="0 0 448 512">
                                <path
                                    d="M64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V173.3c0-17-7-33.3-19.3-45.3L352 51.3C340 39 323.7 32 306.7 32H64zm0 96C64 110.3 78.3 96 96 96H256c17.7 0 32 14.3 32 32v64c0 17.7-14.3 32-32 32H96c-17.7 0-32-14.3-32-32V128zM224 288a64 64 0 1 1 0 128 64 64 0 1 1 0-128z">
                                </path>
                            </svg>
                        </span>
                    </button>
                </form>
                <div class="🤚">
                    <div class="👉"></div>
                    <div class="👉"></div>
                    <div class="👉"></div>
                    <div class="👉"></div>
                    <div class="🌴"></div>
                    <div class="👍"></div>
                </div>
            </div>

            <div class="bg"></div>
            <div class="blob"></div>
        </div>
    </main>

    <script src="app.js"></script>

</body>

</html>
